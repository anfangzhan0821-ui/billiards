<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>台球练习原型</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="table-wrap" aria-label="球台俯视图">
        <div class="table-viewport">
          <canvas id="tableCanvas" width="900" height="500"></canvas>
        </div>
        <button class="menu-btn" id="menuBtn" title="菜单" aria-label="菜单">
          <span></span><span></span><span></span>
        </button>

        <div class="info-panel">
          <strong id="cutLabel">角度球</strong>
          <span id="aimHint">白球中心对准虚线假想球中心</span>
          <em id="separationLabel">分离角 --°</em>
        </div>

        <label class="power-meter" aria-label="力度控制">
          <input id="powerSlider" type="range" min="1" max="10" value="6" orient="vertical" />
          <span class="power-fill" id="powerFill"></span>
        </label>

        <button class="reset-fab" id="resetBtn" title="复位" aria-label="复位">↻</button>

        <div class="overlap-preview" id="overlapPreview" title="白球与目标球重合关系" aria-label="白球与目标球重合关系">
          <span class="preview-ball object-ball"></span>
          <span class="preview-ball cue-ball" id="previewCueBall"></span>
        </div>

        <div class="right-actions">
          <button class="cue-control-btn" id="spinCycleBtn" title="杆法" aria-label="杆法">
            <span class="cue-dot"></span>
          </button>
          <button class="play-fab" id="playBtn" title="击打" aria-label="击打">PLAY</button>
        </div>

        <div class="table-note" id="tableNote">拖动白球或目标球，点击袋口切换目标袋。</div>
      </section>

      <section class="hidden-controls" aria-hidden="true">
        <div class="mode-tabs">
          <button class="tab active" data-mode="aim">瞄准</button>
          <button class="tab" data-mode="angle">分离角</button>
          <button class="tab" data-mode="escape">解球</button>
        </div>
        <div class="control-row">
          <label>
            球类
            <select id="gameType">
              <option value="chinese8">中式八球</option>
              <option value="nineball">九球</option>
            </select>
          </label>
          <label>
            关卡
            <select id="drillSelect">
              <option value="free">自由摆放</option>
              <option value="thin">薄球进攻</option>
              <option value="half">半球瞄准</option>
              <option value="thick">厚球练习</option>
              <option value="long">长台角度</option>
            </select>
          </label>
        </div>
        <div class="segmented" id="spinButtons" aria-label="杆法">
          <button class="active" data-spin="follow">高杆</button>
          <button data-spin="stun">中杆</button>
          <button data-spin="draw">低杆</button>
        </div>
        <div class="control-row three">
          <label>
            左右塞
            <input id="sideSlider" type="range" min="-5" max="5" value="0" />
          </label>
          <label>
            台速
            <select id="clothSpeed">
              <option value="slow">慢</option>
              <option value="medium" selected>中</option>
              <option value="fast">快</option>
            </select>
          </label>
        </div>
        <div class="control-row">
          <label>
            解球方式
            <select id="railCount">
              <option value="1">一库</option>
              <option value="2">两库</option>
              <option value="3">三库</option>
            </select>
          </label>
          <label class="switch-label">
            <input id="showBlockers" type="checkbox" checked />
            障碍球
          </label>
        </div>
        <button id="newDrillBtn" type="button">关卡</button>
        <button id="gameToggleBtn" type="button">球类</button>
        <button id="powerCycleBtn" type="button">力度</button>
        <button id="sideCycleBtn" type="button">塞</button>
        <button id="railCycleBtn" type="button">库数</button>
        <button id="blockersBtn" type="button">障碍</button>
        <button id="photoBtn" type="button">照片</button>
        <button id="openAimViewBtn" type="button">正视</button>
      </section>

      <section class="aim-modal cue-modal" id="aimModal" aria-hidden="true">
        <div class="cue-sheet" role="dialog" aria-modal="true" aria-labelledby="aimModalTitle">
          <h2 id="aimModalTitle">杆法控制</h2>
          <div class="cue-picker">
            <div class="big-cue-ball" id="bigCueBall">
              <button class="hit-dot" id="hitDot" aria-label="击球点"></button>
            </div>
          </div>
          <div class="cue-confirm">
            <button class="confirm-btn" id="confirmCueBtn" title="确认" aria-label="确认">✓</button>
            <button class="cancel-btn" id="closeAimViewBtn" title="取消" aria-label="取消">×</button>
          </div>
          <canvas id="aimDiagramCanvas" width="720" height="460"></canvas>
          <input id="overlapSlider" type="range" min="0" max="100" value="50" title="同步当前俯视图厚薄" />
        </div>
      </section>
    </main>
    <script src="physics-engine.js"></script>
    <script src="app.js"></script>
  </body>
</html>
